services:
  postgres:
    image: postgres:17
    container_name: tuevento-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: 
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tuevento-network

  minio:
    image: minio/minio:latest
    container_name: tuevento-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: 
      MINIO_ROOT_PASSWORD: 
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: tuevento-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - TESTCONTAINERS_RYUK_DISABLED=true
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - tuevento-network

  sonarqube:
    image: sonarqube:lts-community
    container_name: tuevento-sonarqube
    restart: unless-stopped
    ports:
      - "9002:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://tuevento-postgres:5432/sonarqube
      - SONAR_JDBC_USERNAME=
      - SONAR_JDBC_PASSWORD=
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      - postgres
    networks:
      - tuevento-network

  redis:
    image: redis:7-alpine
    container_name: tuevento-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tuevento-network

  backend:
    build:
      context: ./TuEventoBackend/tu-evento
      dockerfile: Dockerfile
    container_name: tuevento-backend-dev
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://tuevento-postgres:5432/tuevento
      - SPRING_DATASOURCE_USERNAME=
      - SPRING_DATASOURCE_PASSWORD=
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=
      - MINIO_SECRET_KEY=
    depends_on:
      - postgres
      - minio
      - redis
    networks:
      - tuevento-network

networks:
  tuevento-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  jenkins_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  redis_data:
