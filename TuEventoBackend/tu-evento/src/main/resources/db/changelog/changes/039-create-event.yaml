databaseChangeLog:
  - changeSet:
      id: 039-create-event
      author: capysoft
      changes:
        - createTable:
            tableName: event
            columns:
              - column:
                  name: event_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: site_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: event_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: finish_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: DRAFT
                  constraints:
                    nullable: false
              - column:
                  name: is_public
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: available_seats
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(100)
              - column:
                  name: updated_by
                  type: VARCHAR(100)
        - addForeignKeyConstraint:
            baseTableName: event
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: user_id
            constraintName: fk_event_user
        - addForeignKeyConstraint:
            baseTableName: event
            baseColumnNames: site_id
            referencedTableName: site
            referencedColumnNames: site_id
            constraintName: fk_event_site
        - addCheckConstraint:
            constraintName: chk_event_finish_after_start
            tableName: event
            constraintBody: finish_date > start_date
        - addUniqueConstraint:
            constraintName: uq_event_name_start_date_site
            tableName: event
            columnNames: event_name, start_date, site_id
        - sql:
            sql: >
              ALTER TABLE event
              ADD CONSTRAINT chk_event_status
              CHECK (status IN ('DRAFT', 'PUBLISHED', 'CANCELLED', 'COMPLETED'));
