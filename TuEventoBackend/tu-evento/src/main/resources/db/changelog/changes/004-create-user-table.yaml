databaseChangeLog:
  - changeSet:
      id: 004-create-user-table
      author: capysoft
      changes:
        - createTable:
            tableName: app_user
            columns:
              - column:
                  name: user_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_status_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: alias
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: activated
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: app_user
            baseColumnNames: user_status_id
            referencedTableName: user_status
            referencedColumnNames: user_status_id
            constraintName: fk_user_user_status
        - addForeignKeyConstraint:
            baseTableName: app_user
            baseColumnNames: role_id
            referencedTableName: role
            referencedColumnNames: role_id
            constraintName: fk_user_role
