databaseChangeLog:
  - changeSet:
      id: 003-create-permission-table
      author: capysoft
      changes:
        - createTable:
            tableName: permission
            columns:
              - column:
                  name: permission_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
