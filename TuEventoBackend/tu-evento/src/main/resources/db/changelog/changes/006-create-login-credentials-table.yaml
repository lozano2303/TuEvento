databaseChangeLog:
  - changeSet:
      id: 006-create-login-credentials-table
      author: capysoft
      changes:
        - createTable:
            tableName: login_credentials
            columns:
              - column:
                  name: login_credentials_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: last_login_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: login_credentials
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: user_id
            constraintName: fk_login_credentials_user
