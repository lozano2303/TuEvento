databaseChangeLog:
  - changeSet:
      id: 048-create-category-event
      author: capysoft
      changes:
        - createTable:
            tableName: category_event
            columns:
              - column:
                  name: category_event_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: category_id
                  type: INT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_category_event_category
                    references: category(category_id)
              - column:
                  name: event_id
                  type: INT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_category_event_event
                    references: event(event_id)
        - addUniqueConstraint:
            tableName: category_event
            columnNames: category_id, event_id
            constraintName: uq_category_event
