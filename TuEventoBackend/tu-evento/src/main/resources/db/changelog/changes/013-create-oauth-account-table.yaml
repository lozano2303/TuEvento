databaseChangeLog:
  - changeSet:
      id: 013-create-oauth-account-table
      author: capysoft
      changes:
        - createTable:
            tableName: oauth_account
            columns:
              - column:
                  name: oauth_account_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: provider
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: provider_user_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: linked_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: oauth_account
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: user_id
            constraintName: fk_oauth_account_user
        - addUniqueConstraint:
            tableName: oauth_account
            columnNames: user_id, provider
            constraintName: uq_oauth_account_user_provider
        - addUniqueConstraint:
            tableName: oauth_account
            columnNames: provider, provider_user_id
            constraintName: uq_oauth_account_provider_user
