databaseChangeLog:
  - changeSet:
      id: 008-create-account-lockout-table
      author: capysoft
      changes:
        - createTable:
            tableName: account_lockout
            columns:
              - column:
                  name: account_lockout_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: failed_attempts
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: window_started_at
                  type: TIMESTAMP
              - column:
                  name: locked_until
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: account_lockout
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: user_id
            constraintName: fk_account_lockout_user
