databaseChangeLog:
  - changeSet:
      id: 026-create-city-table
      author: capysoft
      changes:
        - createTable:
            tableName: city
            columns:
              - column:
                  name: city_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: department_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(50)
              - column:
                  name: updated_by
                  type: VARCHAR(50)
        - addForeignKeyConstraint:
            baseTableName: city
            baseColumnNames: department_id
            referencedTableName: department
            referencedColumnNames: department_id
            constraintName: fk_city_department
