databaseChangeLog:
  - changeSet:
      id: 007-create-account-activation-table
      author: capysoft
      changes:
        - createTable:
            tableName: account_activation
            columns:
              - column:
                  name: account_activation_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: activation_code
                  type: VARCHAR(8)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: activated
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: account_activation
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: user_id
            constraintName: fk_account_activation_user
