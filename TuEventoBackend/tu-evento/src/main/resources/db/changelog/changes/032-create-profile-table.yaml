databaseChangeLog:
  - changeSet:
      id: 032-create-profile-table
      author: capysoft
      changes:
        - createTable:
            tableName: profile
            columns:
              - column:
                  name: profile_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: INT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: city_id
                  type: INT
              - column:
                  name: stored_file_id
                  type: INT
              - column:
                  name: full_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: bio
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(50)
              - column:
                  name: updated_by
                  type: VARCHAR(50)
        - addForeignKeyConstraint:
            baseTableName: profile
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: user_id
            constraintName: fk_profile_user
        - addForeignKeyConstraint:
            baseTableName: profile
            baseColumnNames: city_id
            referencedTableName: city
            referencedColumnNames: city_id
            constraintName: fk_profile_city
        - addForeignKeyConstraint:
            baseTableName: profile
            baseColumnNames: stored_file_id
            referencedTableName: stored_file
            referencedColumnNames: stored_file_id
            constraintName: fk_profile_stored_file
