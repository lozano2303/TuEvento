databaseChangeLog:
  - changeSet:
      id: 001-create-user-status-table
      author: capysoft
      changes:
        - createTable:
            tableName: user_status
            columns:
              - column:
                  name: user_status_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
