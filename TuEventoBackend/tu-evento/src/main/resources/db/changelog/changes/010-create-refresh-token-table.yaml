databaseChangeLog:
  - changeSet:
      id: 010-create-refresh-token-table
      author: capysoft
      changes:
        - createTable:
            tableName: refresh_token
            columns:
              - column:
                  name: refresh_token_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: auth_session_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
              - column:
                  name: issued_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: revoked
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: refresh_token
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: user_id
            constraintName: fk_refresh_token_user
        - addForeignKeyConstraint:
            baseTableName: refresh_token
            baseColumnNames: auth_session_id
            referencedTableName: auth_session
            referencedColumnNames: auth_session_id
            constraintName: fk_refresh_token_auth_session
