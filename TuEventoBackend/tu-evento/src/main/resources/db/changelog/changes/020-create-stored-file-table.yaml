databaseChangeLog:
  - changeSet:
      id: 020-create-stored-file-table
      author: capysoft
      changes:
        - createTable:
            tableName: stored_file
            columns:
              - column:
                  name: stored_file_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: file_category_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: uploaded_by
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: s3_key
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
              - column:
                  name: original_filename
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: size_bytes
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: public_url
                  type: VARCHAR(512)
              - column:
                  name: owner_entity_id
                  type: INT
              - column:
                  name: owner_entity_type
                  type: VARCHAR(50)
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: uploaded_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(50)
              - column:
                  name: updated_by
                  type: VARCHAR(50)
        - addForeignKeyConstraint:
            baseTableName: stored_file
            baseColumnNames: file_category_id
            referencedTableName: file_category
            referencedColumnNames: file_category_id
            constraintName: fk_stored_file_file_category
        - addForeignKeyConstraint:
            baseTableName: stored_file
            baseColumnNames: uploaded_by
            referencedTableName: app_user
            referencedColumnNames: user_id
            constraintName: fk_stored_file_uploaded_by
