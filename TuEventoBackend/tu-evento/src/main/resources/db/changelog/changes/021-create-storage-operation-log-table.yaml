databaseChangeLog:
  - changeSet:
      id: 021-create-storage-operation-log-table
      author: capysoft
      changes:
        - createTable:
            tableName: storage_operation_log
            columns:
              - column:
                  name: log_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: stored_file_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: performed_by
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: operation
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: VARCHAR(500)
              - column:
                  name: occurred_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: storage_operation_log
            baseColumnNames: stored_file_id
            referencedTableName: stored_file
            referencedColumnNames: stored_file_id
            constraintName: fk_storage_operation_log_stored_file
        - addForeignKeyConstraint:
            baseTableName: storage_operation_log
            baseColumnNames: performed_by
            referencedTableName: app_user
            referencedColumnNames: user_id
            constraintName: fk_storage_operation_log_performed_by
