databaseChangeLog:
  - changeSet:
      id: 023-insert-initial-file-categories
      author: capysoft
      changes:
        - insert:
            tableName: file_category
            columns:
              - column:
                  name: storage_provider_id
                  valueNumeric: 1
              - column:
                  name: name
                  value: Organizer Document
              - column:
                  name: code
                  value: ORGANIZER_DOCUMENT
              - column:
                  name: is_public
                  valueBoolean: false
              - column:
                  name: allowed_extensions
                  value: pdf
              - column:
                  name: max_size_mb
                  valueNumeric: 5
