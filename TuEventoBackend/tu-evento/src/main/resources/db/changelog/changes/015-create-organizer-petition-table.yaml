databaseChangeLog:
  - changeSet:
      id: 015-create-organizer-petition-table
      author: capysoft
      changes:
        - createTable:
            tableName: organizer_petition
            columns:
              - column:
                  name: organizer_petition_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: document
                  type: BYTEA
                  constraints:
                    nullable: false
              - column:
                  name: application_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: organizer_petition
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: user_id
            constraintName: fk_organizer_petition_user
        - addUniqueConstraint:
            tableName: organizer_petition
            columnNames: user_id, status
            constraintName: uq_organizer_petition_user_pending
