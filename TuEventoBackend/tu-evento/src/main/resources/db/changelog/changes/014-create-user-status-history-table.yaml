databaseChangeLog:
  - changeSet:
      id: 014-create-user-status-history-table
      author: capysoft
      changes:
        - createTable:
            tableName: user_status_history
            columns:
              - column:
                  name: user_status_history_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: user_status_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: reason
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: user_status_history
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: user_id
            constraintName: fk_user_status_history_user
        - addForeignKeyConstraint:
            baseTableName: user_status_history
            baseColumnNames: user_status_id
            referencedTableName: user_status
            referencedColumnNames: user_status_id
            constraintName: fk_user_status_history_status
