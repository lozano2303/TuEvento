databaseChangeLog:
  - changeSet:
      id: 027-create-site-table
      author: capysoft
      changes:
        - createTable:
            tableName: site
            columns:
              - column:
                  name: site_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: city_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: capacity
                  type: INT
              - column:
                  name: latitude
                  type: DECIMAL(9,6)
              - column:
                  name: longitude
                  type: DECIMAL(9,6)
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(50)
              - column:
                  name: updated_by
                  type: VARCHAR(50)
        - addForeignKeyConstraint:
            baseTableName: site
            baseColumnNames: city_id
            referencedTableName: city
            referencedColumnNames: city_id
            constraintName: fk_site_city
