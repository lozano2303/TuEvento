databaseChangeLog:
  - changeSet:
      id: 005-create-role-permission-table
      author: capysoft
      changes:
        - createTable:
            tableName: role_permission
            columns:
              - column:
                  name: role_permission_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: role_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: permission_id
                  type: INT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: role_permission
            baseColumnNames: role_id
            referencedTableName: role
            referencedColumnNames: role_id
            constraintName: fk_role_permission_role
        - addForeignKeyConstraint:
            baseTableName: role_permission
            baseColumnNames: permission_id
            referencedTableName: permission
            referencedColumnNames: permission_id
            constraintName: fk_role_permission_permission
