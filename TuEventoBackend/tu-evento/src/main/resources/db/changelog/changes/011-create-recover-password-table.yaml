databaseChangeLog:
  - changeSet:
      id: 011-create-recover-password-table
      author: capysoft
      changes:
        - createTable:
            tableName: recover_password
            columns:
              - column:
                  name: recover_password_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(8)
                  constraints:
                    nullable: false
              - column:
                  name: code_status
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: last_password_hash
                  type: VARCHAR(255)
        - addForeignKeyConstraint:
            baseTableName: recover_password
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: user_id
            constraintName: fk_recover_password_user
